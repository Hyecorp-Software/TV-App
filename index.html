<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyecorp Property Group — Reception</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #B8963E;
    --gold-light: #D4AF6A;
    --gold-pale: #F5EDD8;
    --navy: #0D1B2A;
    --navy-mid: #162336;
    --navy-soft: #1E3048;
    --white: #FDFBF7;
    --muted: rgba(253,251,247,0.45);
    --muted-strong: rgba(253,251,247,0.65);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--navy);
    font-family: 'Outfit', sans-serif;
  }

  body { display: flex; flex-direction: column; position: relative; }

  .bg-pattern {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }

  .bg-pattern svg { width: 100%; height: 100%; opacity: 0.04; }

  .glow {
    position: fixed;
    width: 60vw; height: 60vw; border-radius: 50%;
    background: radial-gradient(circle, rgba(184,150,62,0.12) 0%, transparent 70%);
    top: -20vw; left: -10vw;
    pointer-events: none; z-index: 0;
  }

  .glow-2 {
    position: fixed;
    width: 40vw; height: 40vw; border-radius: 50%;
    background: radial-gradient(circle, rgba(30,48,72,0.8) 0%, transparent 70%);
    bottom: -10vw; right: -5vw;
    pointer-events: none; z-index: 0;
  }

  .rule-top {
    position: fixed; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    z-index: 10; opacity: 0.8;
  }

  .rule-bottom {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(184,150,62,0.4), transparent);
    z-index: 10;
  }

  .header {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 2rem 3.5rem; z-index: 5;
  }

  .logo-lockup { display: flex; align-items: center; gap: 1rem; }

  .logo-mark {
    width: 44px; height: 44px;
    border: 1px solid rgba(184,150,62,0.5);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  .logo-mark::before {
    content: ''; position: absolute; inset: 3px;
    border: 1px solid rgba(184,150,62,0.25);
  }

  .logo-mark span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 400;
    color: var(--gold-light); letter-spacing: 0.05em;
  }

  .logo-text { display: flex; flex-direction: column; gap: 1px; }

  .logo-name {
    font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 500;
    color: var(--white); letter-spacing: 0.15em; text-transform: uppercase;
  }

  .logo-sub {
    font-size: 10px; font-weight: 300;
    color: var(--gold); letter-spacing: 0.25em; text-transform: uppercase;
  }

  .header-right { display: flex; align-items: center; gap: 2.5rem; }

  .clock-block { text-align: right; }

  .clock {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem; font-weight: 300;
    color: var(--white); letter-spacing: 0.05em; line-height: 1;
  }

  .date-str {
    font-size: 10px; font-weight: 300;
    color: var(--muted); letter-spacing: 0.2em;
    text-transform: uppercase; margin-top: 3px;
  }

  .main {
    position: relative; z-index: 2;
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 8rem 4rem 5rem; text-align: center;
  }

  .eyebrow {
    font-size: 11px; font-weight: 400;
    color: var(--gold); letter-spacing: 0.4em; text-transform: uppercase;
    margin-bottom: 2.5rem;
    opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards;
  }

  .divider-ornament {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 2.5rem;
    opacity: 0; animation: fadeUp 0.8s ease 0.35s forwards;
  }

  .divider-ornament .line {
    height: 1px; width: 60px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }

  .divider-ornament .line.right {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .divider-ornament .diamond {
    width: 6px; height: 6px;
    border: 1px solid var(--gold); transform: rotate(45deg);
  }

  .greeting-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-weight: 300; color: var(--muted-strong);
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0; animation: fadeUp 0.8s ease 0.5s forwards;
  }

  .visitor-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.5rem, 8vw, 7rem);
    font-weight: 300; color: var(--white);
    line-height: 1.05; letter-spacing: 0.02em;
    opacity: 0; animation: fadeUp 0.9s ease 0.65s forwards;
    transition: all 0.6s ease;
  }

  .sub-message {
    margin-top: 2rem;
    font-size: clamp(0.85rem, 1.5vw, 1.1rem);
    font-weight: 300; color: var(--muted);
    letter-spacing: 0.18em; text-transform: uppercase;
    opacity: 0; animation: fadeUp 0.8s ease 0.85s forwards;
  }

  .standby .visitor-name { font-size: clamp(2.5rem, 6vw, 5.5rem); color: var(--muted-strong); }
  .standby .greeting-label { display: none; }

  .footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 3.5rem; z-index: 5;
    border-top: 1px solid rgba(184,150,62,0.1);
  }

  .footer-tag {
    font-size: 10px; font-weight: 300;
    color: rgba(253,251,247,0.2); letter-spacing: 0.25em; text-transform: uppercase;
  }

  .status-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; color: rgba(253,251,247,0.2);
    letter-spacing: 0.15em; text-transform: uppercase;
  }

  .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--gold); opacity: 0.5;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .updated .visitor-name,
  .updated .greeting-label,
  .updated .sub-message,
  .updated .eyebrow {
    animation: fadeIn 0.7s ease forwards;
  }
</style>
</head>
<body>

<div class="bg-pattern">
  <svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="200" x2="1920" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="880" x2="1920" y2="880" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="1080" stroke="white" stroke-width="0.5"/>
    <line x1="1720" y1="0" x2="1720" y2="1080" stroke="white" stroke-width="0.5"/>
    <rect x="180" y="180" width="40" height="40" fill="none" stroke="white" stroke-width="0.8"/>
    <rect x="1700" y="180" width="40" height="40" fill="none" stroke="white" stroke-width="0.8"/>
    <rect x="180" y="860" width="40" height="40" fill="none" stroke="white" stroke-width="0.8"/>
    <rect x="1700" y="860" width="40" height="40" fill="none" stroke="white" stroke-width="0.8"/>
    <line x1="950" y1="420" x2="970" y2="420" stroke="white" stroke-width="0.5"/>
    <line x1="960" y1="410" x2="960" y2="430" stroke="white" stroke-width="0.5"/>
  </svg>
</div>

<div class="glow"></div>
<div class="glow-2"></div>
<div class="rule-top"></div>
<div class="rule-bottom"></div>

<header class="header">
  <div class="logo-lockup">
    <div class="logo-mark"><span>H</span></div>
    <div class="logo-text">
      <div class="logo-name">Hyecorp</div>
      <div class="logo-sub">Property Group</div>
    </div>
  </div>
  <div class="header-right">
    <div class="clock-block">
      <div class="clock" id="clock">00:00</div>
      <div class="date-str" id="date-str">—</div>
    </div>
  </div>
</header>

<main class="main" id="main-content">
  <div class="eyebrow" id="eyebrow">Reception</div>
  <div class="divider-ornament">
    <div class="line"></div>
    <div class="diamond"></div>
    <div class="line right"></div>
  </div>
  <div class="greeting-label" id="greeting-label">Welcome</div>
  <div class="visitor-name" id="visitor-name">Please take a seat</div>
  <div class="sub-message" id="sub-message">Your host will be with you shortly</div>
</main>

<footer class="footer">
  <div class="footer-tag">Hyecorp Property Group &mdash; Reception</div>
  <div class="status-dot"><span class="dot"></span> Display active</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://ksanojfvxfcsjiazugay.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzYW5vamZ2eGZjc2ppYXp1Z2F5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxODYxNTksImV4cCI6MjA5MTc2MjE1OX0.Vsa2nAhOPzCO4XwbURnXe9miW3Z3o_LSTzY5Kqr_iBg';

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Clock
  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    document.getElementById('clock').textContent = h + ':' + m;
    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('date-str').textContent = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
  }
  updateClock();
  setInterval(updateClock, 30000);

  // Apply data to the screen
  function applyData(data) {
    const main    = document.getElementById('main-content');
    const nameEl  = document.getElementById('visitor-name');
    const labelEl = document.getElementById('greeting-label');
    const subEl   = document.getElementById('sub-message');
    const eyebrow = document.getElementById('eyebrow');

    // Trigger re-animation
    main.classList.remove('updated');
    void main.offsetWidth;
    main.classList.add('updated');

    if (data.standby) {
      main.classList.add('standby');
      nameEl.textContent  = 'Welcome';
      subEl.textContent   = 'Please sign in at reception';
      labelEl.style.display = 'none';
      eyebrow.textContent = 'Hyecorp Property Group';
    } else {
      main.classList.remove('standby');
      labelEl.style.display = '';
      eyebrow.textContent   = 'Reception';
      nameEl.textContent    = data.name  || 'Please take a seat';
      labelEl.textContent   = data.label || 'Welcome';
      subEl.textContent     = data.sub   || 'Your host will be with you shortly';
    }
  }

  // Load initial state
  async function loadInitial() {
    const { data } = await client.from('display').select('*').eq('id', 1).single();
    if (data) applyData(data);
  }

  // Subscribe to realtime changes — updates instantly when admin pushes
  client
    .channel('display-changes')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'display' }, payload => {
      applyData(payload.new);
    })
    .subscribe();

  loadInitial();
</script>
</body>
</html>
